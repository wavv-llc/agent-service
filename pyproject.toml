[tool.ruff]
# Target Python 3.10+
target-version = "py310"

# Line length to match black's default
line-length = 88

# Enable auto-fixing where possible
fix = true

# Exclude common directories
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    "*.egg-info",
    "build",
    "dist",
    "scripts",
]

[tool.ruff.lint]
# Enable comprehensive rule sets
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "DTZ",    # flake8-datetimez
    "T10",    # flake8-debugger
    "EM",     # flake8-errmsg
    "ISC",    # flake8-implicit-str-concat
    "ICN",    # flake8-import-conventions
    "G",      # flake8-logging-format
    "PIE",    # flake8-pie
    "T20",    # flake8-print
    "Q",      # flake8-quotes
    "RSE",    # flake8-raise
    "RET",    # flake8-return
    "SIM",    # flake8-simplify
    "TID",    # flake8-tidy-imports
    "ARG",    # flake8-unused-arguments
    "PTH",    # flake8-use-pathlib
    "PL",     # pylint
    "TRY",    # tryceratops
    "RUF",    # ruff-specific rules
]

# Ignore specific rules that may be too strict or not applicable
ignore = [
    "E501",   # line too long (handled by formatter)
    "TRY003", # avoid specifying long messages outside exception class
    "PLR0913", # too many arguments to function call
    "ISC001", # conflicts with ruff formatter
]

[tool.ruff.lint.flake8-quotes]
# Enforce single quotes for inline, double for multiline (formatter requirement)
inline-quotes = "single"
multiline-quotes = "double"
docstring-quotes = "double"

[tool.ruff.format]
# Use single quotes
quote-style = "single"

# Use 4 spaces for indentation
indent-style = "space"

# Respect magic trailing comma
skip-magic-trailing-comma = false

# Auto-detect line ending
line-ending = "auto"

[tool.ruff.lint.isort]
# Import sorting configuration
known-first-party = ["agent_runtime", "orchestrator", "shared"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]

[tool.ruff.lint.per-file-ignores]
# Allow print statements and unused imports in __init__ files
"__init__.py" = ["F401", "F403"]

[tool.mypy]
# Target Python 3.10+
python_version = "3.10"

# Disallow untyped definitions
disallow_untyped_defs = false

# Warn about unused ignores
warn_unused_ignores = false

# Show error codes
show_error_codes = true

# Exclude directories
exclude = [
    "^.venv/",
    "^venv/",
    "^build/",
    "^dist/",
    "^scripts/",
]

# Ignore missing imports for third-party libraries without type stubs
[[tool.mypy.overrides]]
module = [
    "jsonschema",
    "jsonschema.*",
    "openpyxl",
    "openpyxl.*",
    "docx",
    "docx.*",
    "pypdf",
    "pypdf.*",
    "langfuse",
    "langfuse.*",
    "redis",
    "redis.*",
]
ignore_missing_imports = true
